services:
  api:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run seed && npm run start"
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      JWT_SECRET: cambia_este_secreto_en_produccion
      ADMIN_EMAIL: admin@marcela-labbe.cl
      ADMIN_PASSWORD: Cambiar123
      CORS_ORIGIN: http://localhost:5173
    volumes:
      - ./server:/app
      - api_node_modules:/app/node_modules
      - api_data:/app/data

  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:4000/api
    volumes:
      - ./client:/app
      - web_node_modules:/app/node_modules
    depends_on:
      - api

volumes:
  api_node_modules:
  api_data:
  web_node_modules:
